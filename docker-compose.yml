services:
  postgres:
    container_name: dwh_postgres
    image: postgres:17
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "7890:5432"
    volumes:
      - dwh_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./datasets:/datasets
    networks:
      - dwh_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_warehouse" ]
      timeout: 45s
      interval: 10s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9.12
    container_name: dwh_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - dwh_network

networks:
  dwh_network:
    name: dwh_network

volumes:
  dwh_pgdata:
  pgadmin_data: